name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  lint:
    name: Lint and format check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync --dev

      - name: Run ruff linter
        run: uv run ruff check agent.py tests/ skill/scripts/*.py web/backend/*.py

      - name: Run ruff format check
        run: uv run ruff format --check agent.py tests/ skill/scripts/*.py web/backend/*.py

      - name: Run security scanner (bandit)
        run: |
          uv run bandit -r agent.py web/backend/*.py skill/scripts/*.py \
            -f screen \
            --skip B101,B603,B607,B404,B105 \
            --quiet

  python-tests:
    name: Python tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync --dev

      - name: Run pytest
        run: uv run pytest -m "not integration" -v --tb=short

  frontend-tests:
    name: Frontend tests (Vitest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web/frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run Vitest
        run: npm test -- --run
